<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOL — Терминал помощи (демо-прототип)</title>
<style>
  :root{
    --bg:#EEF3FA; --surface:#FFFFFF; --surface-2:#F5F8FC;
    --ink:#13233F; --muted:#5C6E89; --line:#DCE6F2;
    --primary:#1B57B0; --primary-d:#143F80; --primary-soft:#E5EEFB;
    --accent:#1E9E5A; --accent-soft:#E2F5EA;
    --danger:#E0352B; --danger-d:#B8261E; --danger-soft:#FCE7E5;
    --warn:#E08A1E; --warn-soft:#FBEFDB;
    --sol:#7A3CE0; --sol-soft:#EFE6FC;
    --radius:22px; --radius-s:16px;
    --shadow:0 10px 30px rgba(20,50,100,.10);
    --shadow-s:0 4px 14px rgba(20,50,100,.08);
    --tap:96px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    overflow:hidden;
  }
  /* Терминальный «корпус» — адаптируется под портрет и ландшафт */
  .terminal{
    position:relative;width:min(1180px,100vw);height:min(860px,100vh);
    background:var(--surface);display:flex;flex-direction:column;overflow:hidden;
    box-shadow:var(--shadow);
  }
  @media(min-aspect-ratio:1/1){ .terminal{border-radius:0} }

  /* ---------- Header ---------- */
  header.bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 26px;background:var(--surface);border-bottom:1px solid var(--line);
    flex:none;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{
    width:52px;height:52px;border-radius:14px;background:var(--primary);
    color:#fff;display:grid;place-items:center;font-weight:800;font-size:22px;letter-spacing:.5px;
  }
  .brand .t1{font-size:22px;font-weight:800;line-height:1}
  .brand .t2{font-size:14px;color:var(--muted);margin-top:4px}
  .status{display:flex;align-items:center;gap:10px;font-size:15px;color:var(--muted);font-weight:600}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 5px var(--accent-soft)}

  /* ---------- Screen area ---------- */
  .stage{flex:1;position:relative;overflow:hidden}
  .screen{
    position:absolute;inset:0;padding:30px 34px;overflow-y:auto;
    display:flex;flex-direction:column;gap:22px;
    animation:in .28s ease both;
  }
  @keyframes in{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
  .screen.back{animation:inb .28s ease both}
  @keyframes inb{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}

  .steps{display:flex;align-items:center;gap:8px}
  .steps .pill{height:8px;flex:1;border-radius:6px;background:var(--line)}
  .steps .pill.on{background:var(--primary)}
  .steps .pill.done{background:var(--accent)}

  h1.q{font-size:clamp(26px,4vw,38px);margin:0;line-height:1.12;font-weight:800}
  .sub{font-size:17px;color:var(--muted);margin:-8px 0 0}

  /* ---------- Cards grid (main + choices) ---------- */
  .grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
  .grid.two{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .card{
    background:var(--surface-2);border:2px solid var(--line);border-radius:var(--radius);
    padding:22px;min-height:148px;display:flex;flex-direction:column;gap:14px;justify-content:center;
    cursor:pointer;transition:.15s;text-align:left;font:inherit;color:inherit;
  }
  .card:hover{border-color:var(--primary);background:#fff}
  .card:active{transform:scale(.98)}
  .card .ico{width:56px;height:56px;color:var(--primary);flex:none}
  .card .lbl{font-size:21px;font-weight:700;line-height:1.15}
  .card .hint{font-size:14px;color:var(--muted);font-weight:500}
  .card.soft{background:#fff}

  /* Emergency block on main */
  .emergency{
    border:2px solid var(--danger);background:var(--danger-soft);
    border-radius:var(--radius);padding:22px 24px;display:flex;align-items:center;gap:20px;
    cursor:pointer;transition:.15s;
  }
  .emergency:hover{background:#fff}
  .emergency:active{transform:scale(.99)}
  .emergency .ico{width:58px;height:58px;color:var(--danger);flex:none}
  .emergency .lbl{font-size:24px;font-weight:800;color:var(--danger-d)}
  .emergency .hint{font-size:15px;color:var(--danger-d);opacity:.85;margin-top:3px}

  /* Metro line chooser */
  .lines{display:flex;flex-wrap:wrap;gap:14px}
  .line{
    display:flex;align-items:center;gap:14px;padding:18px 22px;border-radius:var(--radius-s);
    background:var(--surface-2);border:2px solid var(--line);cursor:pointer;transition:.15s;
    font:inherit;color:inherit;flex:1 1 240px;
  }
  .line:hover{background:#fff;border-color:var(--ink)}
  .line:active{transform:scale(.98)}
  .line .num{width:40px;height:40px;border-radius:50%;color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px;flex:none}
  .line .lname{font-size:19px;font-weight:700}

  /* Station list */
  .list{display:flex;flex-direction:column;gap:12px}
  .row{
    display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:var(--radius-s);
    background:var(--surface-2);border:2px solid var(--line);cursor:pointer;transition:.15s;
    font:inherit;color:inherit;text-align:left;
  }
  .row:hover{background:#fff;border-color:var(--primary)}
  .row:active{transform:scale(.99)}
  .row .ico{width:34px;height:34px;color:var(--primary);flex:none}
  .row .rname{font-size:20px;font-weight:700;flex:1}
  .row .chev{width:24px;height:24px;color:var(--muted)}

  /* Result panel */
  .result{background:var(--surface-2);border:2px solid var(--line);border-radius:var(--radius);padding:26px;display:flex;flex-direction:column;gap:20px}
  .route-head{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--line);border-radius:14px;padding:12px 16px;font-weight:700;font-size:18px}
  .chip .ico{width:28px;height:28px;color:var(--primary)}
  .route-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:18px;font-weight:600}
  .stn{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--line);border-radius:30px;padding:10px 18px}
  .stn .d{width:16px;height:16px;border-radius:50%}
  .arrow{width:30px;height:30px;color:var(--muted)}
  .big-arrow{display:flex;align-items:center;gap:16px;background:var(--primary-soft);border-radius:var(--radius-s);padding:20px 24px;font-size:22px;font-weight:800;color:var(--primary-d)}
  .big-arrow .ico{width:46px;height:46px;color:var(--primary)}

  /* Emergency confirm */
  .confirm{background:var(--danger-soft);border:2px solid var(--danger);border-radius:var(--radius);padding:34px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
  .confirm .big-ico{width:84px;height:84px;color:var(--danger)}
  .confirm h2{font-size:30px;margin:0;color:var(--danger-d)}
  .confirm p{font-size:19px;margin:0;color:var(--danger-d)}
  .timer{font-size:48px;font-weight:800;color:var(--danger-d);font-variant-numeric:tabular-nums}
  .pulse{animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

  /* Auto-SOL banner */
  .auto-sol{display:flex;align-items:center;gap:14px;background:var(--sol-soft);border:2px solid var(--sol);border-radius:var(--radius-s);padding:16px 20px;color:#4b1fa0;font-weight:700;font-size:17px}
  .auto-sol .ico{width:34px;height:34px;color:var(--sol);flex:none}

  /* secondary action */
  .btn-line{display:flex;gap:14px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:12px;border:2px solid var(--line);background:#fff;border-radius:16px;padding:16px 22px;font:inherit;font-size:18px;font-weight:700;cursor:pointer;color:var(--ink);transition:.15s}
  .btn:hover{border-color:var(--ink)}
  .btn .ico{width:26px;height:26px;color:var(--primary)}
  .btn.help{border-color:var(--sol);color:#4b1fa0}
  .btn.help .ico{color:var(--sol)}

  .demo-tag{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;background:var(--warn-soft);color:#8a5410;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:700}

  /* ---------- Bottom persistent bar ---------- */
  footer.bar{
    display:flex;gap:16px;padding:16px 26px;background:var(--surface);border-top:1px solid var(--line);flex:none;
  }
  .fbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:14px;border-radius:18px;padding:20px;font:inherit;font-size:21px;font-weight:800;cursor:pointer;border:2px solid transparent;transition:.15s}
  .fbtn:active{transform:scale(.98)}
  .fbtn.home{background:var(--surface-2);color:var(--ink);border-color:var(--line)}
  .fbtn.home:hover{background:#fff;border-color:var(--ink)}
  .fbtn.sol{background:var(--sol);color:#fff}
  .fbtn.sol:hover{background:#6a2fce}
  .fbtn .ico{width:34px;height:34px}
  .fbtn.home .ico{color:var(--primary)}

  /* ---------- SOL overlay ---------- */
  .overlay{position:absolute;inset:0;background:rgba(12,22,45,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:50;padding:30px}
  .overlay.show{display:flex;animation:fade .25s ease both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:26px;width:min(560px,100%);overflow:hidden;box-shadow:var(--shadow)}
  .modal .video{position:relative;background:linear-gradient(140deg,#3a1f73,#7A3CE0);height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff;text-align:center;padding:24px}
  .modal .video .avatar{width:108px;height:108px;border-radius:50%;background:rgba(255,255,255,.16);display:grid;place-items:center;border:3px solid rgba(255,255,255,.5)}
  .modal .video .avatar svg{width:64px;height:64px;color:#fff}
  .modal .video .st{font-size:20px;font-weight:700}
  .modal .video .live{position:absolute;top:16px;left:16px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.28);padding:7px 13px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:.5px}
  .modal .video .live .d{width:9px;height:9px;border-radius:50%;background:#ff5b5b}
  .dots span{display:inline-block;width:9px;height:9px;border-radius:50%;background:#fff;margin:0 3px;animation:b 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}}
  .modal .body{padding:24px;display:flex;flex-direction:column;gap:14px}
  .modal .body h3{margin:0;font-size:22px}
  .modal .body p{margin:0;color:var(--muted);font-size:16px}
  .modal .close{margin-top:6px;background:var(--surface-2);border:2px solid var(--line);border-radius:16px;padding:16px;font:inherit;font-size:18px;font-weight:700;cursor:pointer}
  .modal .close:hover{border-color:var(--ink)}

  /* placeholder screen */
  .placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;color:var(--muted)}
  .placeholder .ico{width:90px;height:90px;color:var(--line)}
  .placeholder h2{margin:0;font-size:26px;color:var(--ink)}

  /* footer credit */
  .credit{position:absolute;bottom:6px;right:12px;font-size:11px;color:var(--muted);opacity:.6;z-index:1}
</style>
</head>
<body>
<div class="terminal" id="terminal">
  <header class="bar">
    <div class="brand">
      <div class="logo">SOL</div>
      <div>
        <div class="t1">Терминал помощи</div>
        <div class="t2">Интерактивный навигатор для слабослышащих</div>
      </div>
    </div>
    <div class="status"><span class="dot"></span> Онлайн</div>
  </header>

  <div class="stage" id="stage"></div>

  <footer class="bar">
    <button class="fbtn home" onclick="go('home')">
      <span class="ico">{home}</span> В начало
    </button>
    <button class="fbtn sol" onclick="openSol(false)">
      <span class="ico">{hands}</span> Переводчик SOL
    </button>
  </footer>

  <!-- SOL overlay -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="video">
        <div class="live"><span class="d"></span> LIVE • SOL</div>
        <div class="avatar">{hands}</div>
        <div class="st" id="solState">Соединяем с переводчиком…</div>
        <div class="dots" id="solDots"><span></span><span></span><span></span></div>
      </div>
      <div class="body">
        <h3 id="solTitle">Видеозвонок переводчику SOL</h3>
        <p id="solDesc">Сейчас на связь выйдет живой сурдопереводчик платформы SOL и поможет вам.</p>
        <button class="close" onclick="closeSol()">Закрыть демо-окно</button>
      </div>
    </div>
  </div>

  <div class="credit">демо-прототип • данные демонстрационные</div>
</div>

<script>
/* ===================== ICONS (inline SVG) ===================== */
const I = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>',
  hands:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11V5.5a1.5 1.5 0 0 1 3 0V10"/><path d="M10 10V4.5a1.5 1.5 0 0 1 3 0V10"/><path d="M13 10V6a1.5 1.5 0 0 1 3 0v6"/><path d="M16 9.5a1.5 1.5 0 0 1 3 0V14a6 6 0 0 1-6 6h-1a6 6 0 0 1-5.2-3l-2.2-3.8a1.5 1.5 0 0 1 2.6-1.5L7 12"/></svg>',
  route:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="2.4"/><circle cx="18" cy="5" r="2.4"/><path d="M8 19h6a4 4 0 0 0 0-8H10a4 4 0 0 1 0-8h6"/></svg>',
  pay:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5" width="19" height="14" rx="2.5"/><path d="M2.5 9.5h19"/><path d="M6 15h4"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>',
  ticket:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 0 0 4 2 2 0 0 1-2 2H5a2 2 0 0 1-2-2 2 2 0 0 0 0-4 2 2 0 0 0 0-4Z"/><path d="M15 6v12" stroke-dasharray="2 3"/></svg>',
  bag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l1 12H5L6 8Z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>',
  help:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 .8-1 1.7"/><path d="M12 17h.01"/></svg>',
  sos:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 3 7v5c0 5 3.8 8.3 9 9 5.2-.7 9-4 9-9V7l-9-4Z"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg>',
  chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>',
  pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11Z"/><circle cx="12" cy="10" r="2.6"/></svg>',
  transfer:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h12l-3-3"/><path d="M20 16H8l3 3"/></svg>',
  exit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4"/><path d="M3 12h11"/><path d="M10 8l4 4-4 4"/></svg>',
  worker:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>',
  heart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"/><path d="M8 12h2l1-2 1.5 3 1-1.5H16"/></svg>',
  fall:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="5" r="2"/><path d="M8 8l-3 5 4 1 1 5"/><path d="M5 13l-2 4"/><path d="M12 14l6 2"/></svg>',
  sick:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 10h.01M15.5 10h.01"/><path d="M8.5 16c1-1 5-1 6 0"/></svg>',
  conflict:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20L12 3Z"/><path d="M12 9v5"/><path d="M12 17h.01"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5 5-5"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 4 6v6c0 5 3.5 7.5 8 9 4.5-1.5 8-4 8-9V6l-8-3Z"/></svg>',
};
function svg(name){return I[name]||''}

/* ===================== DEMO DATA ===================== */
// Демо-схема линий (цвета Московского метро), помечено как демонстрационное
const LINES = [
  {id:'1', color:'#D9232E', name:'Сокольническая', stations:['Охотный Ряд','Лубянка','Чистые пруды','Красные Ворота','Комсомольская','Красносельская','Сокольники']},
  {id:'2', color:'#46B151', name:'Замоскворецкая', stations:['Театральная','Тверская','Маяковская','Белорусская','Динамо','Аэропорт','Сокол']},
  {id:'3', color:'#0078BE', name:'Арбатско-Покровская', stations:['Площадь Революции','Арбатская','Смоленская','Киевская','Парк Победы']},
  {id:'5', color:'#894E35', name:'Кольцевая', stations:['Комсомольская','Курская','Таганская','Павелецкая','Добрынинская','Киевская']},
];

/* ===================== STATE / NAV ===================== */
let stack = [];
let cur = null;
let goingBack = false;
let timerInt = null;

function render(html, opts={}){
  const stage = document.getElementById('stage');
  clearInterval(timerInt);
  stage.innerHTML = `<div class="screen ${goingBack?'back':''}">${html}</div>`;
  if(opts.after) opts.after();
  stage.scrollTop = 0;
}

function go(id, push=true){
  if(push && cur && cur!==id) stack.push(cur);
  if(!push) goingBack = true;
  cur = id;
  SCREENS[id]();
  goingBack = false;
}
function back(){
  if(stack.length){ goingBack=true; cur = stack.pop(); SCREENS[cur](); goingBack=false; }
  else go('home', false);
}

function stepBar(n,total){
  let p='';
  for(let i=1;i<=total;i++) p+=`<div class="pill ${i<n?'done':''} ${i===n?'on':''}"></div>`;
  return `<div class="steps">${p}</div>`;
}
// Кнопка «Позвать сотрудника» внутри потока (вызывает SOL-сессию)
function helpRow(){
  return `<div class="btn-line"><button class="btn help" onclick="openSol(false)"><span class="ico">${svg('hands')}</span> Позвать сотрудника через SOL</button></div>`;
}

/* ===================== SCREENS ===================== */
const SCREENS = {
  /* -------- MAIN -------- */
  home(){
    stack = [];
    render(`
      <h1 class="q">Чем помочь?</h1>
      <p class="sub">Выберите свою ситуацию. Без слов и звонков — нажмите на карточку.</p>
      <div class="grid">
        ${card('route','Добраться до станции','маршрут и пересадки',"go('s1_line')")}
        ${card('pay','Проблема с оплатой','карта, турникет, пополнение',"go('soon')")}
        ${card('clock','Расписание поездов','когда следующий поезд',"go('soon')")}
        ${card('ticket','Льготный проезд','документы и окно кассы',"go('soon')")}
        ${card('bag','Потерял вещи','бюро находок, дежурный',"go('soon')")}
        ${card('help','Другой вопрос','связаться с сотрудником',"openSol(false)")}
      </div>
      <div class="emergency" onclick="startEmergency()">
        <span class="ico">${svg('sos')}</span>
        <div>
          <div class="lbl">Мне плохо / нужна срочная помощь</div>
          <div class="hint">Переводчик SOL подключится автоматически</div>
        </div>
      </div>
    `);
  },

  /* -------- Заглушка для несобранных сценариев -------- */
  soon(){
    render(`
      ${stepBar(1,3)}
      <div class="placeholder">
        <span class="ico">${svg('shield')}</span>
        <h2>Этот сценарий — в следующей сборке</h2>
        <p class="sub" style="max-width:420px">В демо-версии полностью собраны два сценария: «Добраться до станции» и «Срочная помощь». Остальные четыре подключаются по той же логике (3 шага, иконка + текст).</p>
        <button class="btn" onclick="go('home',false)"><span class="ico">${svg('home')}</span> Вернуться к выбору</button>
      </div>
    `);
  },

  /* ============ СЦЕНАРИЙ 1: Я заблудился ============ */
  s1_line(){
    render(`
      ${stepBar(1,3)}
      <h1 class="q">Куда вам нужно? Выберите линию</h1>
      <p class="sub">Нажмите на цвет линии метро.</p>
      <span class="demo-tag">демо-схема линий</span>
      <div class="lines">
        ${LINES.map(l=>`
          <button class="line" onclick="go('s1_station_${l.id}')">
            <span class="num" style="background:${l.color}">${l.id}</span>
            <span class="lname">${l.name}</span>
          </button>`).join('')}
      </div>
      ${helpRow()}
    `);
  },
  ...stationScreens(),

  /* ============ СЦЕНАРИЙ 3: Экстренная помощь ============ */
  em_type(){
    render(`
      ${stepBar(1,3)}
      <h1 class="q">Что случилось?</h1>
      <p class="sub">Нажмите — помощь уже идёт.</p>
      <div class="auto-sol"><span class="ico">${svg('hands')}</span> Переводчик SOL подключается автоматически</div>
      <div class="grid two">
        ${emCard('sick','Мне плохо физически')}
        ${emCard('fall','Упал / травма')}
        ${emCard('heart','Сердце / дыхание')}
        ${emCard('conflict','Угроза / конфликт')}
      </div>
    `);
  },
  em_confirm(){
    render(`
      ${stepBar(2,3)}
      <div class="confirm">
        <span class="big-ico pulse">${svg('shield')}</span>
        <h2>Сотрудник уже вызван</h2>
        <p>Оставайтесь на месте. Помощь идёт к вам.</p>
        <div class="timer" id="emTimer">00:00</div>
        <p>Терминал передал ваше местоположение дежурному.</p>
      </div>
      <div class="auto-sol"><span class="ico">${svg('hands')}</span> Переводчик SOL на линии — помогает объясниться</div>
    `, {after:()=>{ runTimer(); setTimeout(()=>{ if(cur==='em_confirm') openSol(true); }, 1400); }});
  },
};

/* ---- helpers that build screen html ---- */
function card(icon,label,hint,onclick){
  return `<button class="card" onclick="${onclick}">
    <span class="ico">${svg(icon)}</span>
    <span class="lbl">${label}</span>
    <span class="hint">${hint}</span>
  </button>`;
}
function emCard(icon,label){
  return `<button class="card" style="border-color:var(--danger-soft)" onclick="go('em_confirm')">
    <span class="ico" style="color:var(--danger)">${svg(icon)}</span>
    <span class="lbl">${label}</span>
  </button>`;
}

/* Step 2+3 of scenario 1, generated per line */
function stationScreens(){
  const out = {};
  LINES.forEach(l=>{
    out['s1_station_'+l.id] = function(){
      render(`
        ${stepBar(2,3)}
        <h1 class="q">Выберите станцию назначения</h1>
        <p class="sub">Линия «${l.name}»</p>
        <span class="demo-tag">демо-список станций</span>
        <div class="list">
          ${l.stations.map(s=>`
            <button class="row" onclick="showRoute('${l.id}','${s.replace(/'/g,"\\'")}')">
              <span class="ico">${svg('pin')}</span>
              <span class="rname">${s}</span>
              <span class="chev">${svg('chev')}</span>
            </button>`).join('')}
        </div>
        ${helpRow()}
      `);
    };
  });
  return out;
}

let routeCtx = null;
function showRoute(lineId, station){
  routeCtx = {lineId, station};
  cur = 's1_route';
  if(!goingBack) stack.push('s1_station_'+lineId);
  const l = LINES.find(x=>x.id===lineId);
  render(`
    ${stepBar(3,3)}
    <h1 class="q">Ваш маршрут</h1>
    <span class="demo-tag">маршрут и время — демонстрационные</span>
    <div class="result">
      <div class="route-line">
        <span class="stn"><span class="d" style="background:#888"></span> Охотный Ряд</span>
        <span class="arrow">${svg('arrow')}</span>
        <span class="stn"><span class="d" style="background:${l.color}"></span> ${station}</span>
      </div>
      <div class="route-head">
        <span class="chip"><span class="ico">${svg('pin')}</span> 7 остановок</span>
        <span class="chip"><span class="ico">${svg('transfer')}</span> 1 пересадка</span>
        <span class="chip"><span class="ico">${svg('clock')}</span> ~18 мин</span>
      </div>
      <div class="big-arrow">
        <span class="ico">${svg('exit')}</span>
        Идите к платформе по стрелке →
      </div>
    </div>
    ${helpRow()}
  `);
}

/* ============ EMERGENCY entry: авто-эскалация ============ */
function startEmergency(){
  stack = ['home'];
  go('em_type');
}
function runTimer(){
  let s=0;
  const el = document.getElementById('emTimer');
  clearInterval(timerInt);
  timerInt = setInterval(()=>{
    s++;
    if(!document.getElementById('emTimer')){clearInterval(timerInt);return;}
    const m=String(Math.floor(s/60)).padStart(2,'0'), ss=String(s%60).padStart(2,'0');
    document.getElementById('emTimer').textContent = `${m}:${ss}`;
  },1000);
}

/* ===================== SOL OVERLAY ===================== */
function openSol(auto){
  const ov=document.getElementById('overlay');
  document.getElementById('solState').textContent = auto?'Экстренное подключение…':'Соединяем с переводчиком…';
  document.getElementById('solTitle').textContent = auto?'Экстренный вызов переводчика SOL':'Видеозвонок переводчику SOL';
  document.getElementById('solDesc').textContent = auto
    ? 'При угрозе жизни и здоровью переводчик SOL подключается автоматически и помогает объясниться с сотрудником.'
    : 'Сейчас на связь выйдет живой сурдопереводчик платформы SOL и поможет вам.';
  ov.classList.add('show');
  setTimeout(()=>{ const st=document.getElementById('solState'); if(st) st.textContent='Переводчик на связи'; },1800);
}
function closeSol(){ document.getElementById('overlay').classList.remove('show'); }

/* ===================== ICON INJECTION for static markup ===================== */
document.querySelectorAll('.ico, .avatar').forEach(()=>{});
document.body.innerHTML = document.body.innerHTML
  .replace(/\{home\}/g, svg('home'))
  .replace(/\{hands\}/g, svg('hands'));

/* boot */
go('home');
</script>
