<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOL — Терминал помощи</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E9EFF7; --bg2:#F4F8FD;
    --surface:#FFFFFF; --surface-2:#F4F7FC;
    --ink:#0F1E36; --muted:#5E6F8C; --line:#E2EAF4; --line-2:#D4E0EF;
    --primary:#1857C9; --primary-d:#103F97; --primary-soft:#E7EFFD;
    --accent:#13A05A; --accent-soft:#E2F6EC;
    --danger:#E0352B; --danger-d:#B21E16; --danger-soft:#FCE9E7;
    --warn:#B8771A; --warn-soft:#FBF0DC;
    --sol:#7A3CE0; --sol-d:#5a25b3; --sol-soft:#F0E8FC;
    --illus-bg:#F4F1EC;
    --radius:26px; --radius-s:18px;
    --shadow-card:0 1px 2px rgba(16,40,90,.04), 0 8px 24px rgba(16,40,90,.07);
    --shadow-hi:0 8px 18px rgba(16,40,90,.10), 0 24px 50px rgba(16,40,90,.13);
    --shadow-soft:0 2px 10px rgba(16,40,90,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Inter',"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 700px at 12% -10%, #FFFFFF 0%, rgba(255,255,255,0) 55%),
      radial-gradient(1000px 800px at 110% 120%, #DDE9F8 0%, rgba(221,233,248,0) 60%),
      linear-gradient(135deg,#E9EFF7,#F4F8FD);
    display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .terminal{
    position:relative;width:min(1240px,100vw);height:min(880px,100vh);
    background:var(--surface);display:flex;flex-direction:column;overflow:hidden;
    border-radius:0;box-shadow:0 30px 80px rgba(12,30,70,.18);
  }

  /* ---------- Header ---------- */
  header.bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 30px;flex:none;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#FFFFFF, #FBFCFE);
  }
  .brand{display:flex;align-items:center;gap:16px}
  .brand .logo{
    width:56px;height:56px;border-radius:16px;
    background:linear-gradient(145deg,#2466DB,#123F97);
    color:#fff;display:grid;place-items:center;font-weight:900;font-size:20px;letter-spacing:1px;
    box-shadow:0 8px 18px rgba(24,87,201,.35);
  }
  .brand .t1{font-size:22px;font-weight:800;line-height:1;letter-spacing:-.2px}
  .brand .t2{font-size:13.5px;color:var(--muted);margin-top:6px;font-weight:500}
  .status{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--accent);font-weight:700;
    background:var(--accent-soft);padding:9px 16px;border-radius:30px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(19,160,90,.18);animation:bk 2s infinite}
  @keyframes bk{0%,100%{opacity:1}50%{opacity:.45}}

  /* ---------- Stage / screens ---------- */
  .stage{flex:1;position:relative;overflow:hidden}
  .screen{position:absolute;inset:0;padding:30px 38px 34px;overflow-y:auto;display:flex;flex-direction:column;gap:24px;animation:in .32s cubic-bezier(.2,.7,.2,1) both}
  @keyframes in{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
  .screen.back{animation:inb .32s cubic-bezier(.2,.7,.2,1) both}
  @keyframes inb{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}
  .screen::-webkit-scrollbar{width:10px}
  .screen::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:10px}

  .steps{display:flex;align-items:center;gap:10px;max-width:520px}
  .steps .pill{height:9px;flex:1;border-radius:6px;background:var(--line);transition:.3s}
  .steps .pill.on{background:var(--primary)}
  .steps .pill.done{background:var(--accent)}

  h1.q{font-size:clamp(27px,3.6vw,40px);margin:0;line-height:1.1;font-weight:800;letter-spacing:-.6px}
  .sub{font-size:17px;color:var(--muted);margin:0;font-weight:500;line-height:1.4}

  .sc-head{display:flex;align-items:center;gap:20px}
  .sc-thumb{width:96px;height:96px;border-radius:22px;background:var(--illus-bg);overflow:hidden;flex:none;box-shadow:var(--shadow-soft)}
  .sc-thumb img{width:100%;height:100%;object-fit:cover}
  .sc-head .tt{display:flex;flex-direction:column;gap:7px}

  /* ---------- Illustration cards (main) ---------- */
  .grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(248px,1fr))}
  .grid.two{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
  .card{
    position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;display:flex;flex-direction:column;gap:14px;cursor:pointer;overflow:hidden;
    box-shadow:var(--shadow-card);transition:transform .18s cubic-bezier(.2,.7,.2,1),box-shadow .18s,border-color .18s;
    font:inherit;color:inherit;text-align:left;
  }
  .card:hover{transform:translateY(-6px);box-shadow:var(--shadow-hi);border-color:var(--line-2)}
  .card:active{transform:translateY(-2px) scale(.99)}
  .card .illus{border-radius:18px;background:var(--illus-bg);overflow:hidden;aspect-ratio:1/1;display:grid;place-items:center}
  .card .illus img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
  .card:hover .illus img{transform:scale(1.05)}
  .card .ctxt{display:flex;flex-direction:column;gap:4px;padding:2px 6px 6px}
  .card .lbl{font-size:20px;font-weight:800;line-height:1.15;letter-spacing:-.3px}
  .card .hint{font-size:13.5px;color:var(--muted);font-weight:500}
  .card .corner{position:absolute;top:24px;right:24px;width:38px;height:38px;border-radius:50%;background:#fff;
    display:grid;place-items:center;box-shadow:var(--shadow-soft);opacity:0;transform:translateX(8px);transition:.22s}
  .card:hover .corner{opacity:1;transform:none}
  .card .corner svg{width:20px;height:20px;color:var(--primary)}

  /* Emergency banner */
  .emergency{
    display:flex;align-items:center;gap:24px;cursor:pointer;overflow:hidden;
    background:linear-gradient(110deg,#FFF4F3,#FCE7E5);border:1.5px solid var(--danger);
    border-radius:var(--radius);padding:18px 26px 18px 18px;
    box-shadow:0 10px 28px rgba(224,53,43,.16);transition:transform .18s,box-shadow .18s;
  }
  .emergency:hover{transform:translateY(-4px);box-shadow:0 16px 38px rgba(224,53,43,.24)}
  .emergency:active{transform:scale(.99)}
  .emergency .em-illus{width:104px;height:104px;border-radius:20px;background:var(--illus-bg);overflow:hidden;flex:none;box-shadow:var(--shadow-soft)}
  .emergency .em-illus img{width:100%;height:100%;object-fit:cover}
  .emergency .etxt{flex:1}
  .emergency .lbl{font-size:25px;font-weight:900;color:var(--danger-d);letter-spacing:-.4px}
  .emergency .hint{font-size:15.5px;color:var(--danger-d);opacity:.82;margin-top:5px;font-weight:600}
  .emergency .pill-go{width:54px;height:54px;border-radius:50%;background:var(--danger);display:grid;place-items:center;flex:none;box-shadow:0 8px 18px rgba(224,53,43,.4)}
  .emergency .pill-go svg{width:26px;height:26px;color:#fff}

  /* Metro lines */
  .lines{display:flex;flex-wrap:wrap;gap:14px}
  .line{display:flex;align-items:center;gap:16px;padding:18px 22px;border-radius:var(--radius-s);
    background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-card);cursor:pointer;
    transition:transform .16s,box-shadow .16s,border-color .16s;font:inherit;color:inherit;flex:1 1 250px}
  .line:hover{transform:translateY(-3px);box-shadow:var(--shadow-hi);border-color:var(--line-2)}
  .line:active{transform:scale(.99)}
  .line .num{width:44px;height:44px;border-radius:50%;color:#fff;display:grid;place-items:center;font-weight:900;font-size:19px;flex:none;box-shadow:0 4px 10px rgba(0,0,0,.18)}
  .line .lname{font-size:19px;font-weight:700;letter-spacing:-.2px}

  /* Station list */
  .list{display:flex;flex-direction:column;gap:12px}
  .row{display:flex;align-items:center;gap:16px;padding:18px 22px;border-radius:var(--radius-s);
    background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-card);cursor:pointer;
    transition:transform .16s,box-shadow .16s,border-color .16s;font:inherit;color:inherit;text-align:left}
  .row:hover{transform:translateX(5px);box-shadow:var(--shadow-hi);border-color:var(--primary)}
  .row:active{transform:scale(.99)}
  .row .ico{width:36px;height:36px;color:var(--primary);flex:none}
  .row .rname{font-size:20px;font-weight:700;flex:1;letter-spacing:-.2px}
  .row .chev{width:24px;height:24px;color:var(--line-2)}

  /* Result */
  .result{background:linear-gradient(180deg,#FBFCFE,#F4F8FD);border:1px solid var(--line);border-radius:var(--radius);padding:28px;display:flex;flex-direction:column;gap:22px;box-shadow:var(--shadow-card)}
  .route-line{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:18px;font-weight:700}
  .stn{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:30px;padding:11px 20px;box-shadow:var(--shadow-soft)}
  .stn .d{width:16px;height:16px;border-radius:50%}
  .arrow{width:30px;height:30px;color:var(--muted)}
  .route-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px 18px;font-weight:700;font-size:18px;box-shadow:var(--shadow-soft)}
  .chip .ico{width:26px;height:26px;color:var(--primary)}
  .big-arrow{display:flex;align-items:center;gap:18px;background:linear-gradient(110deg,var(--primary),#2a72e6);border-radius:var(--radius-s);padding:22px 26px;font-size:23px;font-weight:800;color:#fff;box-shadow:0 12px 26px rgba(24,87,201,.32)}
  .big-arrow .ico{width:46px;height:46px;color:#fff}

  /* Emergency confirm */
  .confirm{background:linear-gradient(180deg,#FFF5F4,#FCE9E7);border:1.5px solid var(--danger);border-radius:var(--radius);padding:38px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 12px 30px rgba(224,53,43,.14)}
  .confirm .big-ico{width:96px;height:96px;border-radius:24px;background:#fff;display:grid;place-items:center;box-shadow:var(--shadow-soft)}
  .confirm .big-ico svg{width:56px;height:56px;color:var(--danger)}
  .confirm h2{font-size:31px;margin:0;color:var(--danger-d);font-weight:900;letter-spacing:-.5px}
  .confirm p{font-size:19px;margin:0;color:var(--danger-d);font-weight:500}
  .timer{font-size:54px;font-weight:900;color:var(--danger-d);font-variant-numeric:tabular-nums;letter-spacing:1px}
  .pulse{animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.96)}}

  .auto-sol{display:flex;align-items:center;gap:15px;background:var(--sol-soft);border:1.5px solid #c7a8f2;border-radius:var(--radius-s);padding:17px 22px;color:var(--sol-d);font-weight:700;font-size:17px}
  .auto-sol .ico{width:36px;height:36px;color:var(--sol);flex:none}

  /* emergency type cards */
  .em-card{position:relative;background:var(--surface);border:1.5px solid var(--danger-soft);border-radius:var(--radius);
    padding:24px;min-height:140px;display:flex;flex-direction:column;gap:14px;justify-content:center;cursor:pointer;
    box-shadow:var(--shadow-card);transition:transform .16s,box-shadow .16s,border-color .16s;font:inherit;color:inherit;text-align:left}
  .em-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-hi);border-color:var(--danger)}
  .em-card:active{transform:scale(.99)}
  .em-card .ico{width:54px;height:54px;color:var(--danger);flex:none}
  .em-card .lbl{font-size:21px;font-weight:800;letter-spacing:-.3px}

  /* buttons */
  .btn-line{display:flex;gap:14px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:13px;border:1.5px solid var(--line-2);background:#fff;border-radius:16px;padding:17px 24px;font:inherit;font-size:18px;font-weight:700;cursor:pointer;color:var(--ink);transition:.15s;box-shadow:var(--shadow-soft)}
  .btn:hover{border-color:var(--ink);transform:translateY(-2px)}
  .btn.help{border-color:#c7a8f2;color:var(--sol-d);background:var(--sol-soft)}
  .btn.help .ico{color:var(--sol)}
  .btn .ico{width:26px;height:26px;color:var(--primary)}

  .demo-tag{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;background:var(--warn-soft);color:var(--warn);border-radius:10px;padding:7px 13px;font-size:13px;font-weight:700}

  /* ---------- Bottom bar ---------- */
  footer.bar{display:flex;gap:16px;padding:18px 30px;background:linear-gradient(0deg,#FFFFFF,#FBFCFE);border-top:1px solid var(--line);flex:none}
  .fbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:14px;border-radius:18px;padding:21px;font:inherit;font-size:21px;font-weight:800;cursor:pointer;border:1.5px solid transparent;transition:transform .15s,box-shadow .15s,background .15s;letter-spacing:-.2px}
  .fbtn:active{transform:scale(.98)}
  .fbtn.home{background:var(--surface-2);color:var(--ink);border-color:var(--line-2)}
  .fbtn.home:hover{background:#fff;border-color:var(--ink);box-shadow:var(--shadow-soft)}
  .fbtn.sol{background:linear-gradient(135deg,#8a4ef0,#6a2fce);color:#fff;box-shadow:0 10px 24px rgba(122,60,224,.36)}
  .fbtn.sol:hover{box-shadow:0 14px 32px rgba(122,60,224,.46);transform:translateY(-2px)}
  .fbtn .ico{width:32px;height:32px}
  .fbtn.home .ico{color:var(--primary)}

  /* ---------- SOL overlay ---------- */
  .overlay{position:absolute;inset:0;background:rgba(10,20,42,.55);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:60;padding:32px}
  .overlay.show{display:flex;animation:fade .28s ease both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:28px;width:min(540px,100%);overflow:hidden;box-shadow:0 40px 90px rgba(8,18,45,.4);animation:pop .35s cubic-bezier(.2,.8,.2,1) both}
  @keyframes pop{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
  .modal .video{position:relative;background:var(--illus-bg);aspect-ratio:1/1;max-height:320px;overflow:hidden;display:grid;place-items:center}
  .modal .video img{width:100%;height:100%;object-fit:cover}
  .modal .video .live{position:absolute;top:16px;left:16px;display:flex;align-items:center;gap:8px;background:rgba(10,15,30,.7);color:#fff;padding:8px 15px;border-radius:22px;font-size:13px;font-weight:800;letter-spacing:.6px}
  .modal .video .live .d{width:9px;height:9px;border-radius:50%;background:#ff5b5b;animation:bk 1.2s infinite}
  .modal .video .vstate{position:absolute;bottom:14px;left:14px;right:14px;background:rgba(10,15,30,.66);color:#fff;border-radius:14px;padding:12px 16px;font-weight:700;font-size:16px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(4px)}
  .dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:#fff;margin:0 2px;animation:b 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
  .modal .body{padding:26px;display:flex;flex-direction:column;gap:14px}
  .modal .body h3{margin:0;font-size:23px;font-weight:800;letter-spacing:-.3px}
  .modal .body p{margin:0;color:var(--muted);font-size:16px;line-height:1.45}
  .modal .close{margin-top:6px;background:var(--surface-2);border:1.5px solid var(--line-2);border-radius:16px;padding:17px;font:inherit;font-size:18px;font-weight:700;cursor:pointer;transition:.15s}
  .modal .close:hover{border-color:var(--ink)}

  .placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;color:var(--muted)}
  .placeholder .ph-illus{width:150px;height:150px;border-radius:30px;overflow:hidden;background:var(--illus-bg);box-shadow:var(--shadow-card)}
  .placeholder .ph-illus img{width:100%;height:100%;object-fit:cover}
  .placeholder h2{margin:0;font-size:26px;color:var(--ink);font-weight:800;letter-spacing:-.3px}

  .credit{position:absolute;bottom:7px;right:14px;font-size:11px;color:var(--muted);opacity:.5;z-index:1;font-weight:500}
</style>
</head>
<body>
<div class="terminal" id="terminal">
  <header class="bar">
    <div class="brand">
      <div class="logo">SOL</div>
      <div>
        <div class="t1">Терминал помощи</div>
        <div class="t2">Интерактивный навигатор для слабослышащих</div>
      </div>
    </div>
    <div class="status"><span class="dot"></span> Онлайн</div>
  </header>

  <div class="stage" id="stage"></div>

  <footer class="bar">
    <button class="fbtn home" onclick="go('home',false)"><span class="ico">{home}</span> В начало</button>
    <button class="fbtn sol" onclick="openSol(false)"><span class="ico">{hands}</span> Переводчик SOL</button>
  </footer>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="video">
        <div class="live"><span class="d"></span> LIVE • SOL</div>
        <img src="images/interpreter.png" alt="Сурдопереводчик SOL на видеосвязи">
        <div class="vstate"><span id="solState">Соединяем с переводчиком…</span><span class="dots"><span></span><span></span><span></span></span></div>
      </div>
      <div class="body">
        <h3 id="solTitle">Видеозвонок переводчику SOL</h3>
        <p id="solDesc">Сейчас на связь выйдет живой сурдопереводчик платформы SOL и поможет вам объясниться.</p>
        <button class="close" onclick="closeSol()">Закрыть демо-окно</button>
      </div>
    </div>
  </div>

  <div class="credit">демо-прототип · данные демонстрационные</div>
</div>

<script>
/* ===================== ICONS ===================== */
const I = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>',
  hands:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11V5.5a1.5 1.5 0 0 1 3 0V10"/><path d="M10 10V4.5a1.5 1.5 0 0 1 3 0V10"/><path d="M13 10V6a1.5 1.5 0 0 1 3 0v6"/><path d="M16 9.5a1.5 1.5 0 0 1 3 0V14a6 6 0 0 1-6 6h-1a6 6 0 0 1-5.2-3l-2.2-3.8a1.5 1.5 0 0 1 2.6-1.5L7 12"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>',
  chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11Z"/><circle cx="12" cy="10" r="2.6"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>',
  transfer:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h12l-3-3"/><path d="M20 16H8l3 3"/></svg>',
  exit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4"/><path d="M3 12h11"/><path d="M10 8l4 4-4 4"/></svg>',
  heart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"/><path d="M7.5 12h2l1-2 1.5 3 1-1.5H16.5"/></svg>',
  fall:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="5" r="2"/><path d="M8 8l-3 5 4 1 1 5"/><path d="M5 13l-2 4"/><path d="M12 14l6 2"/></svg>',
  sick:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 10h.01M15.5 10h.01"/><path d="M8.5 16c1-1 5-1 6 0"/></svg>',
  conflict:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20L12 3Z"/><path d="M12 9v5"/><path d="M12 17h.01"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 4 6v6c0 5 3.5 7.5 8 9 4.5-1.5 8-4 8-9V6l-8-3Z"/><path d="M9 12l2 2 4-4"/></svg>',
};
function svg(n){return I[n]||''}

/* ===================== DEMO DATA ===================== */
const LINES = [
  {id:'1', color:'#D9232E', name:'Сокольническая', stations:['Охотный Ряд','Лубянка','Чистые пруды','Красные Ворота','Комсомольская','Сокольники']},
  {id:'2', color:'#46B151', name:'Замоскворецкая', stations:['Театральная','Тверская','Маяковская','Белорусская','Динамо','Сокол']},
  {id:'3', color:'#0078BE', name:'Арбатско-Покровская', stations:['Площадь Революции','Арбатская','Смоленская','Киевская','Парк Победы']},
  {id:'5', color:'#894E35', name:'Кольцевая', stations:['Комсомольская','Курская','Таганская','Павелецкая','Добрынинская','Киевская']},
];

/* ===================== NAV ===================== */
let stack=[], cur=null, goingBack=false, timerInt=null;
function render(html,opts={}){
  const stage=document.getElementById('stage');
  clearInterval(timerInt);
  stage.innerHTML=`<div class="screen ${goingBack?'back':''}">${html}</div>`;
  if(opts.after) opts.after();
  stage.scrollTop=0;
}
function go(id,push=true){
  if(push&&cur&&cur!==id) stack.push(cur);
  if(!push){goingBack=true; if(id==='home') stack=[];}
  cur=id; SCREENS[id](); goingBack=false;
}
function stepBar(n,t){let p='';for(let i=1;i<=t;i++)p+=`<div class="pill ${i<n?'done':''} ${i===n?'on':''}"></div>`;return `<div class="steps">${p}</div>`;}
function helpRow(){return `<div class="btn-line"><button class="btn help" onclick="openSol(false)"><span class="ico">${svg('hands')}</span> Позвать сотрудника через SOL</button></div>`;}

/* ===================== SCREENS ===================== */
const SCREENS = {
  home(){
    stack=[];
    render(`
      <div>
        <h1 class="q">Чем помочь?</h1>
        <p class="sub" style="margin-top:8px">Выберите свою ситуацию — без слов и звонков. Нажмите на карточку.</p>
      </div>
      <div class="grid">
        ${card('route','route','Добраться до станции','маршрут и пересадки',"go('s1_line')")}
        ${card('payment','pay','Проблема с оплатой','карта, турникет, пополнение',"go('soon_pay')")}
        ${card('schedule','clock','Расписание поездов','когда следующий поезд',"go('soon_sch')")}
        ${card('benefit','ticket','Льготный проезд','документы и окно кассы',"go('soon_ben')")}
        ${card('lost','bag','Потерял вещи','бюро находок, дежурный',"go('soon_lost')")}
        ${card('question','q','Другой вопрос','связаться с сотрудником',"openSol(false)")}
      </div>
      <div class="emergency" onclick="startEmergency()">
        <div class="em-illus"><img src="images/emergency.png" alt=""></div>
        <div class="etxt">
          <div class="lbl">Мне плохо / нужна срочная помощь</div>
          <div class="hint">Переводчик SOL подключится автоматически</div>
        </div>
        <div class="pill-go">${svg('arrow')}</div>
      </div>
    `);
  },

  /* placeholders for not-yet-built scenarios, each keeps its own illustration */
  soon_pay(){ placeholder('payment','Проблема с оплатой'); },
  soon_sch(){ placeholder('schedule','Расписание поездов'); },
  soon_ben(){ placeholder('benefit','Льготный проезд'); },
  soon_lost(){ placeholder('lost','Потерял вещи'); },

  /* ===== Сценарий 1 ===== */
  s1_line(){
    render(`
      ${stepBar(1,3)}
      <div class="sc-head">
        <div class="sc-thumb"><img src="images/route.png" alt=""></div>
        <div class="tt"><h1 class="q">Куда вам нужно?</h1><p class="sub">Выберите линию метро — нажмите на цвет.</p></div>
      </div>
      <span class="demo-tag">демо-схема линий</span>
      <div class="lines">
        ${LINES.map(l=>`<button class="line" onclick="go('s1_station_${l.id}')"><span class="num" style="background:${l.color}">${l.id}</span><span class="lname">${l.name}</span></button>`).join('')}
      </div>
      ${helpRow()}
    `);
  },
  ...stationScreens(),

  /* ===== Сценарий 3: экстренный ===== */
  em_type(){
    render(`
      ${stepBar(1,3)}
      <div class="sc-head">
        <div class="sc-thumb"><img src="images/emergency.png" alt=""></div>
        <div class="tt"><h1 class="q">Что случилось?</h1><p class="sub">Нажмите — помощь уже идёт к вам.</p></div>
      </div>
      <div class="auto-sol"><span class="ico">${svg('hands')}</span> Переводчик SOL подключается автоматически</div>
      <div class="grid two">
        ${emCard('sick','Мне плохо физически')}
        ${emCard('fall','Упал / травма')}
        ${emCard('heart','Сердце / дыхание')}
        ${emCard('conflict','Угроза / конфликт')}
      </div>
    `);
  },
  em_confirm(){
    render(`
      ${stepBar(2,3)}
      <div class="confirm">
        <div class="big-ico pulse">${svg('shield')}</div>
        <h2>Сотрудник уже вызван</h2>
        <p>Оставайтесь на месте. Помощь идёт к вам.</p>
        <div class="timer" id="emTimer">00:00</div>
        <p>Терминал передал ваше местоположение дежурному.</p>
      </div>
      <div class="auto-sol"><span class="ico">${svg('hands')}</span> Переводчик SOL на линии — помогает объясниться</div>
    `,{after:()=>{runTimer(); setTimeout(()=>{ if(cur==='em_confirm') openSol(true); },1600);}});
  },
};

/* ---- builders ---- */
function card(img,ic,label,hint,onclick){
  return `<button class="card" onclick="${onclick}">
    <div class="illus"><img src="images/${img}.png" alt="${label}"></div>
    <div class="ctxt"><span class="lbl">${label}</span><span class="hint">${hint}</span></div>
    <div class="corner">${svg('arrow')}</div>
  </button>`;
}
function emCard(ic,label){
  return `<button class="em-card" onclick="go('em_confirm')"><span class="ico">${svg(ic)}</span><span class="lbl">${label}</span></button>`;
}
function placeholder(img,title){
  render(`
    ${stepBar(1,3)}
    <div class="placeholder">
      <div class="ph-illus"><img src="images/${img}.png" alt=""></div>
      <h2>«${title}» — в следующей сборке</h2>
      <p class="sub" style="max-width:440px">В демо полностью собраны два сценария: «Добраться до станции» и «Срочная помощь». Остальные подключаются по той же логике — 3 шага, иллюстрация + текст, кнопки SOL и «В начало» на каждом экране.</p>
      <button class="btn" onclick="go('home',false)"><span class="ico">${svg('home')}</span> Вернуться к выбору</button>
    </div>
  `);
}
function stationScreens(){
  const out={};
  LINES.forEach(l=>{
    out['s1_station_'+l.id]=function(){
      render(`
        ${stepBar(2,3)}
        <div class="sc-head">
          <div class="sc-thumb"><img src="images/route.png" alt=""></div>
          <div class="tt"><h1 class="q">Станция назначения</h1><p class="sub">Линия «${l.name}»</p></div>
        </div>
        <span class="demo-tag">демо-список станций</span>
        <div class="list">
          ${l.stations.map(s=>`<button class="row" onclick="showRoute('${l.id}','${s.replace(/'/g,"\\'")}')"><span class="ico">${svg('pin')}</span><span class="rname">${s}</span><span class="chev">${svg('chev')}</span></button>`).join('')}
        </div>
        ${helpRow()}
      `);
    };
  });
  return out;
}
function showRoute(lineId,station){
  cur='s1_route'; if(!goingBack) stack.push('s1_station_'+lineId);
  const l=LINES.find(x=>x.id===lineId);
  render(`
    ${stepBar(3,3)}
    <div class="sc-head">
      <div class="sc-thumb"><img src="images/route.png" alt=""></div>
      <div class="tt"><h1 class="q">Ваш маршрут</h1><p class="sub">Следуйте по стрелке к платформе.</p></div>
    </div>
    <span class="demo-tag">маршрут и время — демонстрационные</span>
    <div class="result">
      <div class="route-line">
        <span class="stn"><span class="d" style="background:#8696ad"></span> Охотный Ряд</span>
        <span class="arrow">${svg('arrow')}</span>
        <span class="stn"><span class="d" style="background:${l.color}"></span> ${station}</span>
      </div>
      <div class="route-head">
        <span class="chip"><span class="ico">${svg('pin')}</span> 7 остановок</span>
        <span class="chip"><span class="ico">${svg('transfer')}</span> 1 пересадка</span>
        <span class="chip"><span class="ico">${svg('clock')}</span> ~18 мин</span>
      </div>
      <div class="big-arrow"><span class="ico">${svg('exit')}</span> Идите к платформе по стрелке →</div>
    </div>
    ${helpRow()}
  `);
}
function startEmergency(){ stack=['home']; go('em_type'); }
function runTimer(){
  let s=0; clearInterval(timerInt);
  timerInt=setInterval(()=>{
    s++; const el=document.getElementById('emTimer');
    if(!el){clearInterval(timerInt);return;}
    el.textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },1000);
}

/* ===================== SOL OVERLAY ===================== */
function openSol(auto){
  const ov=document.getElementById('overlay');
  document.getElementById('solState').textContent=auto?'Экстренное подключение…':'Соединяем с переводчиком…';
  document.getElementById('solTitle').textContent=auto?'Экстренный вызов переводчика SOL':'Видеозвонок переводчику SOL';
  document.getElementById('solDesc').textContent=auto
    ?'При угрозе жизни и здоровью переводчик SOL подключается автоматически и помогает объясниться с сотрудником.'
    :'Сейчас на связь выйдет живой сурдопереводчик платформы SOL и поможет вам объясниться.';
  ov.classList.add('show');
  setTimeout(()=>{const st=document.getElementById('solState'); if(st) st.textContent='Переводчик на связи';},1900);
}
function closeSol(){ document.getElementById('overlay').classList.remove('show'); }

/* inject footer/overlay icons, then boot */
document.body.innerHTML=document.body.innerHTML.replace(/\{home\}/g,svg('home')).replace(/\{hands\}/g,svg('hands'));
go('home');
</script>
</body>
</html>
